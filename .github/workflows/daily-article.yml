name: Daily article (generate & deploy)

# tech-news-daily の daily-digest.yml と同型の構成:
# - 生成: claude-code-action が prompts/daily-article.md に従いファイルを生成する（git 操作はしない）
# - 反映: 本 workflow が main へ commit/push する（GITHUB_TOKEN、PAT 不要）
# - デプロイ: GITHUB_TOKEN push は他 workflow を発火させないため、本 workflow が Cloudflare Pages への wrangler deploy まで実行する
# 認証は CLAUDE_CODE_OAUTH_TOKEN（Pro/Max サブスク、`claude setup-token` で生成した repo secret）。
# git 書き込み系は --disallowedTools でツール層から物理的に禁止する
# （tech-news-daily で 2026-07-16/17 に prompt 頼みのガードが突破された教訓）。

on:
  schedule:
    - cron: '23 21 * * *' # 毎日 21:23 UTC = 06:23 JST（news の 21:00 とずらす）
  workflow_dispatch:

permissions:
  contents: write
  # claude-code-action v1.0.177 以降は GitHub token 交換に OIDC が必須（無いと即失敗する）
  id-token: write

concurrency:
  group: daily-article
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate article with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Read prompts/daily-article.md and follow its instructions exactly. The repository root is the current working directory."
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Bash"
            --disallowedTools "Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git config:*),Bash(git remote:*),Bash(git reset:*),Bash(git rebase:*)"

      - name: Rebuild archive index from articles.json
        # LLM は archive/index.html を編集しない。data/articles.json（一次ソース）から
        # 決定的に再生成し、スキーマ違反（未知カテゴリ等）はここで run を落とす
        run: python3 scripts/build_archive.py

      - name: Rebuild recent-articles section on index.html
        run: python3 scripts/build_recent.py

      - name: Commit and push article
        id: commit
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # claude-code-action が git 認証設定を自分のトークンで上書きしたまま終了する
          # （push 時点で失効し Invalid username or token になる）ため、GITHUB_TOKEN に張り直す
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if [ -z "$(git status --porcelain -- index.html archive/ data/ feed.xml topics.md)" ]; then
            # Claude が禁止ガードを突破して自分で commit した場合と生成失敗を区別する
            if git log -1 --format='%an' | grep -qi claude; then
              echo "::error::Claude が生成物を自分で commit している（禁止ガード突破）。直前コミット: $(git log -1 --oneline)"
            else
              echo "::error::生成物に変更がない（生成失敗の可能性）"
            fi
            exit 1
          fi
          # JST 基準（cron は 21:23 UTC 発火で UTC 日付はまだ前日。prompt 側の Step 3 と揃える）
          TODAY=$(TZ=Asia/Tokyo date '+%Y-%m-%d')
          # 最低限の生成品質ガード: index.html が今日の日付を持つこと
          if ! grep -q "$TODAY" index.html; then
            echo "::error::index.html に今日の日付 ($TODAY) が無い。生成不良として中断"
            exit 1
          fi
          TITLE=$(sed -n 's|.*<h2 class="article-title">\(.*\)</h2>.*|\1|p' index.html | head -1)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html archive/ data/ feed.xml topics.md
          git commit -m "${TODAY} の基礎解説: ${TITLE:-記事}"
          git pull --rebase origin main
          git push origin main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.pushed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # git 追跡ファイルのみのクリーンコピーから deploy（untracked 混入防止）
          CLEAN=$(mktemp -d)
          git archive HEAD | tar -x -C "$CLEAN"
          npx --yes wrangler@4 pages deploy "$CLEAN" --project-name=tech-learning-daily --branch=main
