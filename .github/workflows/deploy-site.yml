name: Deploy site (manual content push)

# 手動 push（ローカルセッションからのサイトアセット変更）を Cloudflare Pages に反映する。
# 日次 run（daily-article.yml）は GITHUB_TOKEN で push するため本 workflow は発火せず、
# 二重デプロイにはならない（日次 run は自前で Cloudflare へ deploy する）。

on:
  push:
    branches: [main]
    paths:
      - index.html
      - 'archive/**'
      - style.css
      - feed.xml
      - favicon.ico
      - icon-192.png
      - apple-touch-icon.png

permissions:
  contents: read

concurrency:
  group: site-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          CLEAN=$(mktemp -d)
          git archive HEAD | tar -x -C "$CLEAN"
          npx --yes wrangler@4 pages deploy "$CLEAN" --project-name=tech-learning-daily --branch=main
